            background: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Inter', system-ui, sans-serif;

            height: 100vh;

            scrollbar-width: thin;
            scrollbar-color: #475569 #1e293b;

        .sidebar-wrap::-webkit-scrollbar { width: 5px; }
        .sidebar-wrap::-webkit-scrollbar-track { background: transparent; }
        .sidebar-wrap::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 20px; }

        .prompt-at { color: #64748b; }
        .prompt-host { color: #60a5fa; }
        .prompt-sep { color: #475569; }
        .prompt-path { color: #fbbf24; }
        .prompt-branch { color: #f472b6; }
        .prompt-dollar { color: #94a3b8; }
        .cmd-text { color: #e2e8f0; }
        .out-error { color: #f87171; }
        .out-success { color: #34d399; }
        .out-warning { color: #fbbf24; }
        .out-info { color: #94a3b8; }
        .out-hash { color: #fbbf24; }
        .out-branch { color: #34d399; }
        .out-added { color: #34d399; }

            background-position: right 0.5rem center;

        .task-number.active { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    </style>
</head>

            <div id="repo-state" class="bg-slate-900/60 p-2.5 rounded text-[11px] font-mono border border-slate-700/40 text-slate-400 grid grid-cols-2 gap-1.5"></div>

<script>
// ============================================================
//  GIT ENGINE — High-Fidelity Simulation
// ============================================================
class GitEngine {
    constructor() { this.reset(); }

    reset() {
        this.fs = {};
        this.isGitInited = false;
        this.staging = [];
        this.commits = [];
        this.branches = {};
        this.currentBranch = 'main';
        this.head = null;
        this.tags = {};
        this.remotes = {};
        this.config = {};
        this.stashes = [];
        this.gpgConfigured = false;
        this.dir = '~';
        this.committedFiles = {};
        this.modifiedFiles = new Set();
        this.deletedStagedFiles = [];
    }

    _genId() { return Math.random().toString(16).substring(2, 9); }

    _getIgnoredPatterns() {
        if (!this.fs['.gitignore']) return [];
        return this.fs['.gitignore'].content.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
    }

    _isIgnored(filename) {
        return this._getIgnoredPatterns().some(p => {
            if (p.endsWith('/')) return filename.startsWith(p);
            if (p.startsWith('*.')) return filename.endsWith(p.substring(1));
            if (p.startsWith('**/')) return filename.includes(p.substring(3));
            return filename === p;
        });
    }

    _isCommitted(filename) {
        return this.commits.some(c => c.files.includes(filename));
    }

    init() {
        if (this.isGitInited) return 'Reinitialized existing Git repository in .git/';
        this.isGitInited = true;
        this.fs['.git'] = { type: 'dir' };
        const defaultBranch = this.config['init.defaultBranch'] || 'main';
        this.currentBranch = defaultBranch;
        this.branches[defaultBranch] = null;
        const d = this.dir === '~' ? '/home/user/project' : this.dir;
        return `Initialized empty Git repository in ${d}/.git/`;
    }

    status() {
        if (!this.isGitInited) return { error: true, text: 'fatal: not a git repository (or any of the parent directories): .git' };
        let lines = [];
        lines.push(`On branch ${this.currentBranch}`);
        if (!this.head) lines.push('\nNo commits yet\n');
        else lines.push('');

        const staged = [...this.staging];
        const allFiles = Object.keys(this.fs).filter(f => f !== '.git');
        const untracked = allFiles.filter(f => !this.staging.includes(f) && !this._isCommitted(f) && !this._isIgnored(f));
        const modified = allFiles.filter(f => this._isCommitted(f) && !this.staging.includes(f) && this.modifiedFiles.has(f));

        if (staged.length === 0 && untracked.length === 0 && modified.length === 0) {
            lines.push('nothing to commit, working tree clean');
            return { error: false, text: lines.join('\n') };
        }

        if (staged.length > 0) {
            lines.push('Changes to be committed:');
            lines.push('  (use "git restore --staged <file>..." to unstage)');
            staged.forEach(f => {
                const isNew = !this._isCommitted(f);
                lines.push(`\t${isNew ? 'new file' : 'modified'}:   ${f}`);
            });
            lines.push('');
        }

        if (modified.length > 0) {
            lines.push('Changes not staged for commit:');
            lines.push('  (use "git add <file>..." to update what will be committed)');
            modified.forEach(f => lines.push(`\tmodified:   ${f}`));
            lines.push('');
        }

        if (untracked.length > 0) {
            lines.push('Untracked files:');
            lines.push('  (use "git add <file>..." to include in what will be committed)');
            untracked.forEach(f => lines.push(`\t${f}`));
            lines.push('');
        }

        return { error: false, text: lines.join('\n') };
    }

    add(args) {
        if (!this.isGitInited) return 'fatal: not a git repository';
        const allFiles = Object.keys(this.fs).filter(f => f !== '.git' && !this._isIgnored(f));
        let filesToAdd = [];

        if (args === '.' || args === '-A' || args === '--all') {
            filesToAdd = allFiles;
        } else if (args === '-u') {
            filesToAdd = allFiles.filter(f => this._isCommitted(f));
        } else if (args === '--patch') {
            return 'PATCH_MODE';
        } else {
            const target = args.replace(/['"]/g, '');
            if (!this.fs[target]) return `fatal: pathspec '${target}' did not match any files`;
            if (!this._isIgnored(target)) filesToAdd.push(target);
        }

        filesToAdd.forEach(f => {
            if (!this.staging.includes(f)) this.staging.push(f);
            this.modifiedFiles.delete(f);
        });
        return '';
    }

    commit(message, opts = {}) {
        if (!this.isGitInited) return 'fatal: not a git repository';

        let filesToCommit = [...this.staging];
        let parent = this.head;

        if (opts.amend) {
            if (!this.head) return 'fatal: You have nothing to amend.';
            const old = this.commits.find(c => c.id === this.head);
            if (old) {
                filesToCommit = [...new Set([...old.files, ...this.staging])];
                parent = old.parent;
                this.commits = this.commits.filter(c => c.id !== this.head);
            }
        } else if (opts.all) {
            const allTracked = Object.keys(this.fs).filter(f => f !== '.git' && this._isCommitted(f));
            allTracked.forEach(f => { if (!this.staging.includes(f)) this.staging.push(f); });
            filesToCommit = [...this.staging];
        }

        if (filesToCommit.length === 0 && !opts.allowEmpty) {
            return 'nothing to commit, working tree clean';
        }

        const id = this._genId();
        const commitObj = {
            id, message,
            files: filesToCommit,
            parent,
            branch: this.currentBranch,
            author: `${this.config['user.name'] || 'User'} <${this.config['user.email'] || 'user@example.com'}>`,
            timestamp: new Date().toISOString().replace('T', ' ').substring(0, 19),
            signed: opts.sign || this.gpgConfigured
        };

        this.commits.push(commitObj);
        this.head = id;
        if (this.currentBranch !== 'detached HEAD') {
            this.branches[this.currentBranch] = id;
        }
        this.staging = [];
        this.modifiedFiles.clear();

        const root = parent === null ? '(root-commit) ' : '';
        const sig = commitObj.signed ? '\n gpg: Signature made with RSA key\n gpg: Good signature' : '';
        return `[${this.currentBranch} ${root}${id}] ${message}${sig}\n ${commitObj.files.length} file(s) changed`;
    }

    log(args = '') {
        if (!this.isGitInited) return 'fatal: not a git repository';
        if (!this.head) return `fatal: your current branch '${this.currentBranch}' does not have any commits yet`;

        let lines = [];
        let current = this.head;
        let count = 0;
        const maxCount = args.includes('-') ? parseInt((args.match(/-(\d+)/) || [0, 999])[1]) : 999;

        while (current && count < maxCount) {
            const c = this.commits.find(x => x.id === current);
            if (!c) break;

            let tagStr = '';
            const matchingTags = Object.keys(this.tags).filter(t => this.tags[t] === c.id);
            if (matchingTags.length > 0) tagStr = `, tag: ${matchingTags.join(', tag: ')}`;

            const isHead = c.id === this.head;
            const decoration = isHead ? ` (HEAD -> ${this.currentBranch}${tagStr})` : (tagStr ? ` (${tagStr.substring(2)})` : '');

            if (args.includes('--oneline') || args.includes('lg')) {
                const prefix = args.includes('lg') || args.includes('--graph') ? '* ' : '';
                lines.push(`${prefix}{{hash}}${c.id}{{/hash}}{{branch}}${decoration}{{/branch}} ${c.message}`);
            } else if (args.includes('--stat')) {
                lines.push(`{{hash}}commit ${c.id}{{/hash}}{{branch}}${decoration}{{/branch}}`);
                lines.push(`Author: ${c.author}`);
                lines.push(`Date:   ${c.timestamp}`);
                lines.push(`\n    ${c.message}\n`);
                c.files.forEach(f => lines.push(` ${f} | 1 +`));
                lines.push(` ${c.files.length} file(s) changed\n`);
            } else {
                lines.push(`{{hash}}commit ${c.id}{{/hash}}{{branch}}${decoration}{{/branch}}`);
                lines.push(`Author: ${c.author}`);
                lines.push(`Date:   ${c.timestamp}`);
                lines.push(`\n    ${c.message}\n`);
                if (args.includes('--name-only')) {
                    c.files.forEach(f => lines.push(f));
                    lines.push('');
                }
            }
            current = c.parent;
            count++;
        }
        return lines.join('\n');
    }

    branch(args = '') {
        if (!this.isGitInited) return 'fatal: not a git repository';
        if (!args || args === '-a' || args === '--all') {
            const local = Object.keys(this.branches).map(b =>
                b === this.currentBranch ? `* {{branch}}${b}{{/branch}}` : `  ${b}`
            );
            if (args === '-a' || args === '--all') {
                Object.keys(this.remotes).forEach(r => {
                    local.push(`  remotes/${r}/main`);
                });
            }
            return local.join('\n');
        }

        const parts = args.split(/\s+/);
        if (parts[0] === '-d' || parts[0] === '-D') {
            const target = parts[1];
            if (!this.branches[target]) return `error: branch '${target}' not found.`;
            if (target === this.currentBranch) return `error: Cannot delete branch '${target}' checked out.`;
            delete this.branches[target];
            return `Deleted branch ${target} (was ${this._genId()}).`;
        }
        if (parts[0] === '-m' || parts[0] === '-M') {
            const oldName = this.currentBranch;
            const newName = parts[1];
            this.branches[newName] = this.branches[oldName];
            delete this.branches[oldName];
            this.currentBranch = newName;
            return '';
        }

        const name = parts[0];
        if (this.branches.hasOwnProperty(name)) return `fatal: A branch named '${name}' already exists.`;
        this.branches[name] = this.head;
        return '';
    }

    checkout(args) {
        if (!this.isGitInited) return 'fatal: not a git repository';
        const parts = args.split(/\s+/);

        if (parts[0] === '-b') {
            const name = parts[1];
            if (this.branches.hasOwnProperty(name)) return `fatal: A branch named '${name}' already exists.`;
            this.branches[name] = this.head;
            this.currentBranch = name;
            return `Switched to a new branch '${name}'`;
        }
        if (parts[0] === '--' && parts[1]) {
            const file = parts[1];
            this.modifiedFiles.delete(file);
            return '';
        }

        const name = parts[0];
        if (this.branches.hasOwnProperty(name)) {
            this.currentBranch = name;
            this.head = this.branches[name];
            return `Switched to branch '${name}'`;
        }
        // Check if it's a tag or commit hash
        if (this.tags[name]) {
            this.currentBranch = 'detached HEAD';
            this.head = this.tags[name];
            return `Note: switching to '${name}'.\nYou are in 'detached HEAD' state.`;
        }
        return `error: pathspec '${name}' did not match any file(s) known to git.`;
    }

    switchBranch(args) {
        const parts = args.split(/\s+/);
        if (parts[0] === '-c') {
            return this.checkout(`-b ${parts[1]}`);
        }
        return this.checkout(args);
    }

    merge(args) {
        if (!this.isGitInited) return 'fatal: not a git repository';
        const parts = args.split(/\s+/);
        const branchName = parts.filter(p => !p.startsWith('-') && !p.startsWith('"')).pop();

        if (args.includes('hotfix') || args.includes('conflict')) {
            return `Auto-merging README.md\nCONFLICT (content): Merge conflict in README.md\nAutomatic merge failed; fix conflicts and then commit the result.`;
        }

        const noFF = args.includes('--no-ff');
        if (noFF) {
            return `Merge made by the 'recursive' strategy.\n 1 file changed, 2 insertions(+)`;
        }

        return `Updating ${this._genId()}..${this._genId()}\nFast-forward\n 1 file changed, 2 insertions(+)`;
    }

    tag(args = '') {
        if (!args) {
            const tagList = Object.keys(this.tags);
            return tagList.length > 0 ? tagList.join('\n') : '';
        }
        const parts = args.split(/\s+/);
        if (parts[0] === '-d') {
            const tagName = parts[1];
            if (!this.tags[tagName]) return `error: tag '${tagName}' not found.`;
            delete this.tags[tagName];
            return `Deleted tag '${tagName}'`;
        }
        if (parts[0] === '-a') {
            const tagName = parts[1];
            this.tags[tagName] = this.head;
            return '';
        }
        const tagName = parts[0];
        this.tags[tagName] = this.head;
        return '';
    }

    stash(args = '') {
        if (!args || args === 'push') {
            this.stashes.unshift({ files: [...this.staging], message: 'WIP on ' + this.currentBranch });
            this.staging = [];
            return `Saved working directory and index state WIP on ${this.currentBranch}`;
        }
        if (args.startsWith('save')) {
            const msgMatch = args.match(/"([^"]+)"/);
            const msg = msgMatch ? msgMatch[1] : 'WIP';
            this.stashes.unshift({ files: [...this.staging], message: msg });
            this.staging = [];
            return `Saved working directory and index state On ${this.currentBranch}: ${msg}`;
        }
        if (args === 'list') {
            return this.stashes.map((s, i) => `stash@{${i}}: ${s.message}`).join('\n') || '';
        }
        if (args === 'pop') {
            if (this.stashes.length === 0) return 'No stash entries found.';
            const s = this.stashes.shift();
            this.staging = [...s.files];
            return `On branch ${this.currentBranch}\nChanges reinstated.\nDropped stash@{0}`;
        }
        if (args === 'apply') {
            if (this.stashes.length === 0) return 'No stash entries found.';
            this.staging = [...this.stashes[0].files];
            return `On branch ${this.currentBranch}\nChanges reinstated.`;
        }
        if (args === 'drop') {
            if (this.stashes.length === 0) return 'No stash entries found.';
            this.stashes.shift();
            return 'Dropped stash@{0}';
        }
        return '';
    }

    remote(args = '') {
        if (!args) return Object.keys(this.remotes).join('\n');
        if (args === '-v') {
            return Object.entries(this.remotes).map(([n, u]) =>
                `${n}\t${u} (fetch)\n${n}\t${u} (push)`
            ).join('\n');
        }
        const parts = args.split(/\s+/);
        if (parts[0] === 'add') {
            this.remotes[parts[1]] = parts[2];
            return '';
        }
        if (parts[0] === 'remove' || parts[0] === 'rm') {
            delete this.remotes[parts[1]];
            return '';
        }
        return '';
    }

    restore(args) {
        if (!this.isGitInited) return 'fatal: not a git repository';
        if (args.includes('--staged')) {
            const file = args.replace('--staged', '').trim();
            this.staging = this.staging.filter(f => f !== file);
            return '';
        }
        const file = args.trim();
        this.modifiedFiles.delete(file);
        return '';
    }

    createFile(name, content = '') {
        this.fs[name] = { type: 'file', content };
        if (this._isCommitted(name)) this.modifiedFiles.add(name);
        return '';
    }

    removeFile(name) {
        delete this.fs[name];
        this.staging = this.staging.filter(f => f !== name);
        return '';
    }

    getPromptInfo() {
        return {
            path: this.dir,
            branch: this.isGitInited ? this.currentBranch : null
        };
    }
}

// ============================================================
//  SCRIPTED OUTPUT ENGINE — Realistic Terminal Responses
// ============================================================
function getScriptedOutput(input) {
    const cmd = input.trim();

    // System commands
    if (cmd === 'git --version') return 'git version 2.47.1';
    if (cmd === 'git help') return `usage: git [-v | --version] [-h | --help] [-C <path>] [-c <name>=<value>]

These are common Git commands used in various situations:

start a working area
   clone     Clone a repository into a new directory
   init      Create an empty Git repository

work on the current change
   add       Add file contents to the index
   restore   Restore working tree files

examine the history and state
   bisect    Use binary search to find the commit that introduced a bug
   diff      Show changes between commits
   log       Show commit logs
   show      Show various types of objects
   status    Show the working tree status

grow, mark and tweak your common history
   branch    List, create, or delete branches
   commit    Record changes to the repository
   merge     Join two or more development histories together
   rebase    Reapply commits on top of another base tip
   reset     Reset current HEAD to the specified state
   switch    Switch branches
   tag       Create, list, delete or verify a tag object

collaborate
   fetch     Download objects and refs from another repository
   pull      Fetch from and integrate with another repository
   push      Update remote refs along with associated objects`;

    // Config commands
    if (cmd.startsWith('git config --global user.name')) return '';
    if (cmd.startsWith('git config --global user.email')) return '';
    if (cmd.startsWith('git config --global core.editor')) return '';
    if (cmd.startsWith('git config --global init.defaultBranch')) return '';
    if (cmd.startsWith('git config --global alias.')) return '';
    if (cmd.startsWith('git config --global commit.gpgsign')) return '';
    if (cmd === 'git config --list') return `user.name=Muhammad Ali
user.email=ali@example.com
core.editor=code --wait
init.defaultbranch=main
alias.st=status
alias.lg=log --oneline --graph --decorate --all
color.ui=auto`;

    // Diff commands
    if (cmd === 'git diff' || cmd === 'git diff --staged' || cmd === 'git diff --cached') return `diff --git a/app.js b/app.js
index 8a3b5c7..e4f2d1a 100644
--- a/app.js
+++ b/app.js
@@ -1 +1,2 @@
-const x = 1;
+const x = 2;
+const y = 3;`;

    if (cmd === 'git show') return `commit a1b2c3d (HEAD -> main)

// Populate module selector
(function populateSelect() {
    const groups = { 'Beginner': [], 'Intermediate': [], 'Advanced': [] };
    for (const [key, mod] of Object.entries(MODULES)) {
        const level = mod.level.charAt(0).toUpperCase() + mod.level.slice(1);
        groups[level].push({ key, title: mod.title });
    }
    for (const [label, items] of Object.entries(groups)) {
        const optgroup = document.createElement('optgroup');
        optgroup.label = `── ${label} ──`;
        items.forEach(item => {
            const opt = document.createElement('option');
            opt.value = item.key;
            opt.textContent = item.title;
            optgroup.appendChild(opt);
        });
        moduleSelect.appendChild(optgroup);
    }
})();

function escapeHtml(str) {
    return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function formatOutput(text) {
    let escaped = escapeHtml(text);
    // Apply custom color tokens
    escaped = escaped.replace(/\{\{hash\}\}(.*?)\{\{\/hash\}\}/g, '<span class="out-hash">$1</span>');
    escaped = escaped.replace(/\{\{branch\}\}(.*?)\{\{\/branch\}\}/g, '<span class="out-branch">$1</span>');
    escaped = escaped.replace(/\{\{added\}\}(.*?)\{\{\/added\}\}/g, '<span class="out-added">$1</span>');
    escaped = escaped.replace(/\{\{removed\}\}(.*?)\{\{\/removed\}\}/g, '<span class="out-removed">$1</span>');
    // Color diff output
    escaped = escaped.replace(/^(\+.+)$/gm, '<span class="out-added">$1</span>');
    escaped = escaped.replace(/^(\-.+)$/gm, '<span class="out-removed">$1</span>');
    escaped = escaped.replace(/^(@@.+@@.*)$/gm, '<span class="out-header">$1</span>');
    escaped = escaped.replace(/^(diff --.+)$/gm, '<span class="text-slate-400">$1</span>');
    escaped = escaped.replace(/^(index .+)$/gm, '<span class="text-slate-500">$1</span>');
    // Color warnings and errors
    escaped = escaped.replace(/(⚠️.*)/g, '<span class="out-warning">$1</span>');
    escaped = escaped.replace(/(❌.*)/g, '<span class="out-error">$1</span>');
    escaped = escaped.replace(/(🔍.*)/g, '<span class="text-blue-400">$1</span>');
    // Color branch references
    escaped = escaped.replace(/\* (\w[\w\-\/]*)/g, '* <span class="out-branch">$1</span>');
    return escaped;
}

function writeCommand(cmd) {
    const div = document.createElement('div');
    div.className = 'mt-3';
    const info = git.getPromptInfo();
    const branchHtml = info.branch ? `<span class="prompt-sep"> (</span><span class="prompt-branch">${info.branch}</span><span class="prompt-sep">)</span>` : '';
    div.innerHTML = `<span class="prompt-user">user</span><span class="prompt-at">@</span><span class="prompt-host">git-env</span><span class="prompt-sep">:</span><span class="prompt-path">${info.path}</span>${branchHtml}<span class="prompt-dollar"> $</span> <span class="cmd-text">${escapeHtml(cmd)}</span>`;
    termOutput.appendChild(div);
}

function writeOutput(text) {
    if (!text) return;
    const div = document.createElement('div');
    div.className = 'mb-1 text-slate-300';
    div.innerHTML = formatOutput(text);
    termOutput.appendChild(div);
}

function writeSystem(text, type = 'info') {
    const div = document.createElement('div');
    const colors = {
        'info': 'text-slate-400 italic',
        'success': 'text-emerald-400',
        'error': 'text-red-400',
        'task': 'text-blue-400',
    };
    div.className = `text-xs my-1 ${colors[type] || colors.info}`;
    div.innerHTML = text;
    termOutput.appendChild(div);
}

function scrollTerminal() {
    termOutput.scrollTop = termOutput.scrollHeight;
}

function flashTerminal(type) {
    const cls = type === 'success' ? 'flash-success' : 'flash-error';
    termOutput.classList.add(cls);
    setTimeout(() => termOutput.classList.remove(cls), 600);
}

function updatePrompt() {
    const info = git.getPromptInfo();
    promptPath.textContent = info.path;
    if (info.branch) {
        promptBranch.innerHTML = `<span class="prompt-sep"> (</span><span class="prompt-branch">${info.branch}</span><span class="prompt-sep">)</span>`;
    } else {
        promptBranch.innerHTML = '';
    }
}

function updateProgress() {
    const mod = MODULES[currentModuleKey];
    const total = mod.steps.length;
    const pct = total > 0 ? Math.round((currentStepIndex / total) * 100) : 0;
    progressBar.style.width = pct + '%';
    progressText.textContent = `${currentStepIndex} / ${total}`;
}

function renderGuide() {
    const mod = MODULES[currentModuleKey];
    const step = mod.steps[currentStepIndex];
    const levelClass = `level-badge-${mod.level}`;

    let html = `
        <div class="mb-4">
            <span class="inline-block px-2 py-0.5 text-[10px] font-bold uppercase tracking-wider rounded-full mb-2 ${levelClass}">${mod.level}</span>
            <h3 class="font-bold text-white text-sm leading-tight">${mod.title}</h3>
        </div>
    `;

    // Concept box
    if (mod.concepts && mod.concepts.length > 0) {
        html += `<div class="concept-box p-3 rounded-lg mb-4 text-xs text-slate-300 leading-relaxed space-y-1.5">
            <div class="font-bold text-indigo-300 text-[10px] uppercase tracking-wider mb-1">💡 Key Concepts</div>`;
        mod.concepts.forEach(c => html += `<div>• ${c}</div>`);
        html += `</div>`;
    }

    // Step list
    html += `<div class="space-y-2 mb-4">`;
    mod.steps.forEach((s, i) => {
        let numClass = 'task-number';
        let borderClass = 'border-slate-700/40';
        let bgClass = '';
        if (i < currentStepIndex) { numClass += ' done'; borderClass = 'border-emerald-800/40'; bgClass = 'bg-emerald-900/10'; }
        else if (i === currentStepIndex) { numClass += ' active'; borderClass = 'border-blue-700/40'; bgClass = 'bg-blue-900/10'; }

        html += `<div class="flex items-start gap-2.5 p-2 rounded-lg border ${borderClass} ${bgClass} transition-colors">
            <span class="${numClass}">${i < currentStepIndex ? '✓' : (i + 1)}</span>
            <div class="flex-1 min-w-0">
                <div class="text-xs ${i === currentStepIndex ? 'text-white font-semibold' : (i < currentStepIndex ? 'text-emerald-400/70 line-through' : 'text-slate-500')}">${s.task}</div>
                ${i === currentStepIndex && s.explain ? `<div class="text-[11px] text-slate-400 mt-1 leading-relaxed">${s.explain}</div>` : ''}

    html += `</div>`;

function showHint() {
    const mod = MODULES[currentModuleKey];
    const step = mod.steps[currentStepIndex];
    if (!step) { hintDisplay.classList.add('hidden'); return; }

    hintDisplay.classList.remove('hidden');
    hintDisplay.innerHTML = `<div class="text-[10px] text-teal-400/70 uppercase font-bold mb-1">💡 Hint — Try this command:</div>
        <div class="bg-black/40 p-2 rounded font-mono text-teal-300 mt-1 whitespace-pre-wrap">${escapeHtml(step.hint || step.cmd)}</div>`;
}

function hideHint() {
    hintDisplay.classList.add('hidden');
}

function loadModule(key) {
    currentModuleKey = key;
    currentStepIndex = 0;
    const mod = MODULES[key];
    mod.setup(git);

    termOutput.innerHTML = '';
    writeSystem(`━━━ Module Loaded: ${mod.title} ━━━`, 'success');
    writeSystem(`Level: ${mod.level.toUpperCase()} | Steps: ${mod.steps.length}`, 'info');
    if (mod.steps[0]) {
        writeSystem(`\n▶ Task 1: ${mod.steps[0].task}`, 'task');
    }
    scrollTerminal();
    hideHint();
    renderGuide();
    moduleSelect.value = key;
}

function processCommand(rawInput) {
    const lines = rawInput.split('\n').map(l => l.trim()).filter(l => l);
    if (lines.length === 0) return;

    lines.forEach(cmd => {
        if (!cmd) return;

        // Add to history
        commandHistory.push(cmd);
        historyIndex = commandHistory.length;

        writeCommand(cmd);

        if (cmd === 'clear') {
            termOutput.innerHTML = '';
            renderGuide();
            return;
        }
        if (cmd === 'help') {
            writeOutput(`Available commands:
  git init          Initialize a new repository
  git status        Show working tree status
  git add <file>    Stage changes
  git commit -m ""  Record changes
  git log           Show commit history
  git branch        List/create branches
  git checkout      Switch branches
  git merge         Merge branches
  git diff          Show changes
  git stash         Stash changes
  git tag           Manage tags
  git remote        Manage remotes
  git push/pull     Sync with remote
  git reset         Reset HEAD
  git revert        Revert a commit
  git rebase        Rebase commits
  git cherry-pick   Apply specific commit
  git bisect        Binary search for bugs
  git reflog        Show HEAD movements
  clear             Clear terminal
  help              Show this help`);
            scrollTerminal();
            return;
        }

        // Try scripted output first
        let output = getScriptedOutput(cmd);

        // If not scripted, use the engine
        if (output === null) {
            output = executeOnEngine(cmd);
        }

        if (output && output !== '') {
            writeOutput(output);
        }

        // Handle side effects
        handleSideEffects(cmd);
    });

    // Check step completion against the full raw input
    checkStepCompletion(rawInput);
    renderGuide();
    scrollTerminal();
}

function executeOnEngine(cmd) {
    if (cmd.startsWith('echo')) {
        const match = cmd.match(/^echo\s+"([^"]*)"\s*(>|>>)\s*(.+)$/);
        if (match) {
            const content = match[1];
            const op = match[2];
            const file = match[3].trim();
            if (op === '>>') {
                const existing = git.fs[file] ? git.fs[file].content : '';
                git.createFile(file, existing + '\n' + content);
            } else {
                git.createFile(file, content);
            }
            return '';
        }
        return '';
    }

    if (cmd.startsWith('mkdir') && cmd.includes('cd')) {
        const cdMatch = cmd.match(/cd\s+(\S+)/);
        if (cdMatch) git.dir = '~/' + cdMatch[1];
        return '';
    }
    if (cmd.startsWith('cd ')) {
        git.dir = cmd.split('cd ')[1].trim();
        return '';
    }
    if (cmd.startsWith('mkdir')) return '';
    if (cmd.startsWith('ls')) {
        const items = Object.keys(git.fs).filter(f => f !== '.git');
        return items.length > 0 ? items.join('  ') : '';
    }
    if (cmd.startsWith('cat ') && !cmd.includes('>')) {
        const file = cmd.replace('cat ', '').trim();
        return git.fs[file] ? git.fs[file].content : `cat: ${file}: No such file or directory`;
    }

    if (!cmd.startsWith('git ')) {
        return `bash: ${cmd.split(' ')[0]}: command not found`;
    }

    const parts = cmd.split(/\s+/);
    const action = parts[1];
    const args = parts.slice(2).join(' ');

    switch (action) {
        case 'init': return git.init();
        case 'status': {
            const result = git.status();
            return typeof result === 'object' ? result.text : result;
        }
        case 'add': return git.add(args);
        case 'commit': {
            const isAmend = args.includes('--amend');
            const isSign = args.includes('-S');
            const isAll = args.includes('-a') || args.includes('-am');
            let message = '';
            const msgMatch = cmd.match(/-m\s+"([^"]+)"/);
            const amMatch = cmd.match(/-am\s+"([^"]+)"/);
            if (msgMatch) message = msgMatch[1];
            else if (amMatch) message = amMatch[1];
            else if (isAmend) message = 'Amended commit';
            else return 'error: switch `m\' requires a value';
            return git.commit(message, { amend: isAmend, sign: isSign, all: isAll });
        }
        case 'log': return git.log(args);
        case 'branch': return git.branch(args);
        case 'checkout': return git.checkout(args);
        case 'switch': return git.switchBranch(args);
        case 'merge': return git.merge(args);
        case 'tag': return git.tag(args);
        case 'stash': return git.stash(args);
        case 'remote': return git.remote(args);
        case 'restore': return git.restore(args);
        case 'config': {
            // Store config values in engine
            const cfgMatch = cmd.match(/git config (?:--global\s+)?(\S+)\s+"?([^"]+)"?/);
            if (cfgMatch) {
                git.config[cfgMatch[1]] = cfgMatch[2];
            }
            return '';
        }
        default: return `git: '${action}' is not a git command. See 'git help'.`;
    }
}

function handleSideEffects(cmd) {
    // Handle file creation from multi-command lines
    if (cmd.includes('&&')) {
        const parts = cmd.split('&&').map(p => p.trim());
        parts.forEach(p => {
            if (p.startsWith('echo') || p.startsWith('git add') || p.startsWith('git commit')) {
                executeOnEngine(p);
            }
        });
    }
    if (cmd === 'gpg --gen-key') git.gpgConfigured = true;
}

function checkStepCompletion(rawInput) {
    const mod = MODULES[currentModuleKey];
    if (currentStepIndex >= mod.steps.length) return;

    const step = mod.steps[currentStepIndex];
    const normalizedInput = rawInput.replace(/\n/g, ' ').trim();

    let match = false;
    if (step.expected instanceof RegExp) {
        match = step.expected.test(normalizedInput);
    } else {
        // Check each line of input against expected
        const inputLines = rawInput.split('\n').map(l => l.trim()).filter(l => l);
        match = inputLines.some(line => line.toLowerCase() === step.expected.toLowerCase()) ||
                normalizedInput.toLowerCase() === step.expected.toLowerCase();
    }

    if (match) {
        currentStepIndex++;
        totalCompletedSteps++;
        flashTerminal('success');

        if (currentStepIndex < mod.steps.length) {
            const next = mod.steps[currentStepIndex];
            setTimeout(() => {
                writeSystem(`\n✅ Task complete!`, 'success');
                writeSystem(`▶ Task ${currentStepIndex + 1}: ${next.task}`, 'task');
                scrollTerminal();
            }, 200);
        } else {
            setTimeout(() => {
                writeSystem(`\n🎉 Module "${mod.title}" completed! Great job!`, 'success');
                writeSystem(`Select the next module from the dropdown to continue.`, 'info');
                scrollTerminal();
            }, 200);
        }
        hideHint();
    }
}

// ============================================================
//  EVENT LISTENERS
// ============================================================
termInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
        const val = termInput.value;
        termInput.value = '';
        processCommand(val);
    }
    else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (historyIndex > 0) {
            historyIndex--;
            termInput.value = commandHistory[historyIndex];
        }
    }
    else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (historyIndex < commandHistory.length - 1) {
            historyIndex++;
            termInput.value = commandHistory[historyIndex];
        } else {
            historyIndex = commandHistory.length;
            termInput.value = '';
        }
    }
    else if (e.key === 'Tab') {
        e.preventDefault();
        // Auto-fill from current step hint
        const mod = MODULES[currentModuleKey];
        const step = mod.steps[currentStepIndex];
        if (step) {
            const cmdToFill = (step.hint || step.cmd).split('\n')[0];
            termInput.value = cmdToFill;
        }
    }
    else if (e.key === 'l' && e.ctrlKey) {
        e.preventDefault();
        termOutput.innerHTML = '';
    }
});

termInput.addEventListener('paste', (e) => {
    e.preventDefault();
    const text = (e.clipboardData || window.clipboardData).getData('text');
    processCommand(text);
});

$('load-module-btn').addEventListener('click', () => {
    loadModule(moduleSelect.value);
    termInput.focus();
});

$('reset-btn').addEventListener('click', () => {
    loadModule(currentModuleKey);
    termInput.focus();
});

hintBtn.addEventListener('click', () => {
    if (hintDisplay.classList.contains('hidden')) showHint();
    else hideHint();
});

document.addEventListener('click', (e) => {
    if (!e.target.closest('select') && !e.target.closest('button') && !e.target.closest('aside')) {
        termInput.focus();
    }
});

// Initialize
window.onload = () => {
    loadModule('m01');
    termInput.focus();
};
</script>
