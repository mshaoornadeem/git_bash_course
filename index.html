<script>
    /**
     * ADVANCED GIT ENGINE CORE
     */
    class GitEngine {
        constructor() {
            this.reset();
        }

        reset() {
            this.fs = {}; 
            this.isGitInited = false;
            this.staging = []; 
            this.commits = []; 
            this.branches = { 'master': null };
            this.currentBranch = 'master';
            this.head = null; 
            this.tags = {};
            this.remotes = {};
            this.config = { 'user.name': 'Learner', 'user.email': 'learner@git.com' };
            this.gpgConfigured = false;
        }

        getIgnoredPatterns() {
            if (!this.fs['.gitignore']) return [];
            return this.fs['.gitignore'].content.split('\n').map(l => l.trim()).filter(l => l && !l.startsWith('#'));
        }

        isIgnored(filename) {
            const patterns = this.getIgnoredPatterns();
            return patterns.some(p => {
                if (p.endsWith('/')) return filename.startsWith(p);
                if (p.startsWith('*.')) return filename.endsWith(p.substring(1));
                return filename === p;
            });
        }

        init(bare = false) {
            if (this.isGitInited) return "Reinitialized existing Git repository";
            this.isGitInited = true;
            this.fs['.git'] = { type: 'dir' };
            this.branches['master'] = null;
            return bare ? "Initialized empty Git repository in /bare-repo.git/" : "Initialized empty Git repository in /work/.git/";
        }

        clone(url) {
            this.init();
            this.remotes['origin'] = url;
            this.createFile('README.md', '# Project');
            this.add('README.md');
            this.commit('Initial commit from remote');
            return `Cloning into 'project'...\nremote: Enumerating objects: 3, done.\nremote: Total 3 (delta 0), reused 0 (delta 0)\nReceiving objects: 100% (3/3), done.`;
        }

        status() {
            if (!this.isGitInited) return "fatal: not a git repository";
            let output = `On branch ${this.currentBranch}\n`;
            if (this.head === null) output += "No commits yet\n";
            output += "\n";
            
            const trackedFiles = this.staging;
            const allFiles = Object.keys(this.fs).filter(f => f !== '.git');
            const untrackedFiles = allFiles.filter(f => !this.staging.includes(f) && !this.isCommittedInCurrentBranch(f) && !this.isIgnored(f));
            
            if (trackedFiles.length === 0 && untrackedFiles.length === 0) {
                return output + "nothing to commit, working tree clean";
            }

            if (trackedFiles.length > 0) {
                output += "Changes to be committed:\n\n";
                trackedFiles.forEach(f => output += `\tnew file:   ${f}\n`);
                output += "\n";
            }

            if (untrackedFiles.length > 0) {
                output += "Untracked files:\n\n";
                untrackedFiles.forEach(f => output += `\t${f}\n`);
                output += "\n";
            }
            return output;
        }

        add(args) {
            if (!this.isGitInited) return "fatal: not a git repository";
            const filesToAdd = [];
            const allFiles = Object.keys(this.fs).filter(f => f !== '.git' && !this.isIgnored(f));

            if (args === "." || args === "-A") {
                filesToAdd.push(...allFiles);
            } else if (args === "-u") {
                filesToAdd.push(...allFiles.filter(f => this.isCommittedInCurrentBranch(f)));
            } else {
                if (!this.fs[args]) return `fatal: pathspec '${args}' did not match any files`;
                if (!this.isIgnored(args)) filesToAdd.push(args);
            }

            filesToAdd.forEach(f => {
                if (!this.staging.includes(f)) this.staging.push(f);
            });
            return "";
        }

        commit(message, amend = false, sign = false) {
            if (!this.isGitInited) return "fatal: not a git repository";
            
            let filesToCommit = [...this.staging];
            let parent = this.head;

            if (amend) {
                if (!this.head) return "fatal: You have nothing to amend.";
                const oldCommit = this.commits.find(c => c.id === this.head);
                filesToCommit = [...new Set([...oldCommit.files, ...this.staging])];
                parent = oldCommit.parent;
                // Remove old commit logically
                this.commits = this.commits.filter(c => c.id !== this.head);
            } else if (this.staging.length === 0) {
                return "nothing to commit, working tree clean";
            }
            
            const id = Math.random().toString(16).substring(2, 9);
            const commitObj = {
                id,
                message,
                files: filesToCommit,
                parent: parent,
                branch: this.currentBranch,
                author: `${this.config['user.name']} <${this.config['user.email']}>`,
                timestamp: new Date().toLocaleString(),
                signed: sign && this.gpgConfigured
            };
            
            this.commits.push(commitObj);
            this.head = id;
            if (this.currentBranch !== 'detached HEAD') this.branches[this.currentBranch] = id;
            this.staging = [];
            
            let sigInfo = commitObj.signed ? `\n[GPG Signed Commit]` : '';
            return `[${this.currentBranch} ${id}] ${message}${sigInfo}\n ${commitObj.files.length} file changed.`;
        }

        log(args) {
            if (!this.isGitInited) return "fatal: not a git repository";
            if (!this.head) return `fatal: your current branch '${this.currentBranch}' does not have any commits yet`;
            
            let output = "";
            let current = this.head;
            while(current) {
                const c = this.commits.find(x => x.id === current);
                if(!c) break;
                
                let tagStr = Object.keys(this.tags).find(t => this.tags[t] === c.id);
                let dec = tagStr ? ` \x1b[32m(tag: ${tagStr})\x1b[0m` : '';

                if (args.includes('--oneline')) {
                    output += `\x1b[33m${c.id}\x1b[0m${dec} ${c.message}\n`;
                } else {
                    let sigStr = c.signed ? `\x1b[32mgpg: Signature made using RSA key\x1b[0m\n` : '';
                    output += `\x1b[33mcommit ${c.id}\x1b[0m${dec}\nAuthor: ${c.author}\nDate:   ${c.timestamp}\n${sigStr}\n    ${c.message}\n\n`;
                    if (args.includes('--name-only')) {
                        c.files.forEach(f => output += `${f}\n`);
                        output += '\n';
                    }
                }
                current = c.parent;
            }
            return output;
        }

        diff() {
            if (this.staging.length === 0) return "";
            let out = "";
            this.staging.forEach(f => {
                out += `\x1b[32mdiff --git a/${f} b/${f}\x1b[0m\n+ New changes in ${f}\n`;
            });
            return out;
        }

        show() {
            if (!this.head) return "fatal: bad default revision 'HEAD'";
            const c = this.commits.find(x => x.id === this.head);
            return this.log(['']).split('\n\n')[0] + `\n\n\x1b[32mdiff --git...\x1b[0m\n+ contents of commit`;
        }

        clean(args) {
            if (!args.includes('-f')) return "fatal: clean.requireForce defaults to true and neither -i, -n, nor -f given; refusing to clean";
            let removed = 0;
            Object.keys(this.fs).forEach(f => {
                if (f !== '.git' && !this.staging.includes(f) && !this.isCommittedInCurrentBranch(f) && !this.isIgnored(f)) {
                    delete this.fs[f];
                    removed++;
                }
            });
            return `Removing ${removed} untracked files`;
        }

        tag(name) {
            if (!name) return Object.keys(this.tags).join('\n');
            if (this.tags[name]) return `fatal: tag '${name}' already exists`;
            this.tags[name] = this.head;
            return "";
        }

        remote(action, name, url) {
            if (action === 'add') {
                this.remotes[name] = url;
                return "";
            } else if (action === '-v') {
                return Object.entries(this.remotes).map(([k,v]) => `${k}\t${v} (fetch)\n${k}\t${v} (push)`).join('\n');
            }
        }

        push() {
            if (Object.keys(this.remotes).length === 0) return "fatal: No configured push destination.";
            return `Enumerating objects: 5, done.\nWriting objects: 100% (5/5), 400 bytes | 400.00 KiB/s, done.\nTo ${Object.values(this.remotes)[0]}\n   refs/heads/${this.currentBranch} -> ${this.currentBranch}`;
        }

        branch(name) {
            if (!this.isGitInited) return "fatal: not a git repository";
            if (!name) return Object.keys(this.branches).map(b => (b === this.currentBranch ? `* \x1b[32m${b}\x1b[0m` : `  ${b}`)).join('\n');
            if (this.branches[name]) return `fatal: A branch named '${name}' already exists.`;
            this.branches[name] = this.head;
            return "";
        }

        checkout(name) {
            if (this.branches[name]) {
                this.currentBranch = name;
                this.head = this.branches[name];
                return `Switched to branch '${name}'`;
            }
            return `error: pathspec '${name}' did not match any file(s) known to git`;
        }

        isCommittedInCurrentBranch(filename) {
            let current = this.head;
            while(current) {
                const c = this.commits.find(x => x.id === current);
                if (c && c.files.includes(filename)) return true;
                current = c ? c.parent : null;
            }
            return false;
        }

        createFile(filename, content = "") {
            this.fs[filename] = { type: 'file', content: content };
            return "";
        }
    }

    /**
     * MODULE DEFINITIONS & CURRICULUM
     */
    const modules = {
        'workflow-1': {
            title: "1. Core Workflow (Scratch)",
            setup: (git) => { git.reset(); },
            steps: [
                { task: "Initialize a new repository", expected: "git init", cmd: "git init" },
                { task: "Create an index file", expected: 'echo "hello" > index.html', cmd: 'echo "hello" > index.html' },
                { task: "Check repository status", expected: "git status", cmd: "git status" },
                { task: "Stage the new file", expected: "git add index.html", cmd: "git add index.html" },
                { task: "Commit the file", expected: /git commit -m ".+"/, cmd: 'git commit -m "Initial commit"' }
            ]
        },
        'workflow-2': {
            title: "2. Working on Existing Projects",
            setup: (git) => { git.reset(); },
            steps: [
                { task: "Clone a remote repository", expected: /git clone .+/, cmd: 'git clone https://github.com/org/repo.git' },
                { task: "Create a new branch 'feature'", expected: "git branch feature", cmd: "git branch feature" },
                { task: "Switch to the branch", expected: "git checkout feature", cmd: "git checkout feature" },
                { task: "Make changes", expected: 'echo "update" > data.txt', cmd: 'echo "update" > data.txt' },
                { task: "Add and commit", expected: /git commit -m ".+"/, cmd: 'git add .\ngit commit -m "data update"' },
                { task: "Push changes to remote", expected: "git push", cmd: "git push" }
            ]
        },
        'history': {
            title: "3. Advanced History & Logs",
            setup: (git) => {
                git.reset(); git.init();
                git.createFile('app.js'); git.add('app.js'); git.commit('Init app');
                git.createFile('style.css'); git.add('style.css'); git.commit('Add styles');
                git.createFile('index.html'); git.add('index.html'); git.commit('Add html');
            },
            steps: [
                { task: "View one-line history", expected: "git log --oneline", cmd: "git log --oneline", desc: "Use `--oneline` for a compact view." },
                { task: "View history with modified files", expected: "git log --name-only", cmd: "git log --name-only", desc: "Use `--name-only` to see which files changed in each commit." },
                { task: "View who changed a file", expected: "git blame app.js", cmd: "git blame app.js", desc: "Use `git blame <file>` to see author info per line." }
            ]
        },
        'modify': {
            title: "4. Modifying Commits",
            setup: (git) => {
                git.reset(); git.init();
                git.createFile('config.json'); git.add('config.json'); git.commit('Add config');
            },
            steps: [
                { task: "Oh no, you forgot a file! Create it.", expected: 'echo "key" > secret.json', cmd: 'echo "key" > secret.json' },
                { task: "Stage the forgotten file.", expected: 'git add secret.json', cmd: 'git add secret.json' },
                { task: "Amend the previous commit", expected: /git commit --amend/, cmd: 'git commit --amend -m "Add config and secret"', desc: "Use `git commit --amend -m 'new msg'` to add staged changes to the last commit." }
            ]
        },
        'ignore': {
            title: "5. Ignoring Files (.gitignore)",
            setup: (git) => { git.reset(); git.init(); },
            steps: [
                { task: "Create a junk file", expected: 'echo "junk" > debug.log', cmd: 'echo "junk" > debug.log' },
                { task: "Check status (it's untracked)", expected: "git status", cmd: "git status" },
                { task: "Create a .gitignore file ignoring *.log", expected: 'echo "*.log" > .gitignore', cmd: 'echo "*.log" > .gitignore' },
                { task: "Check status again (log is hidden!)", expected: "git status", cmd: "git status", desc: "Notice `debug.log` is no longer listed. Only `.gitignore` is." },
                { task: "Add all safe files", expected: "git add .", cmd: "git add ." }
            ]
        },
        'security': {
            title: "6. Security & GPG Signatures",
            setup: (git) => { git.reset(); git.init(); git.createFile('main.c'); git.add('main.c'); },
            steps: [
                { task: "Generate a GPG key", expected: "gpg --gen-key", cmd: "gpg --gen-key", desc: "Generates a cryptographic keypair." },
                { task: "Configure Git to use GPG", expected: "git config --global commit.gpgsign true", cmd: "git config --global commit.gpgsign true" },
                { task: "Create a signed commit", expected: /git commit -S -m ".+"/, cmd: 'git commit -S -m "Secure commit"', desc: "Use the `-S` flag to sign your commit cryptographically." },
                { task: "Verify signature in log", expected: "git log --show-signature", cmd: "git log --show-signature" }
            ]
        },
        'tags': {
            title: "7. Tagging & Releases",
            setup: (git) => { git.reset(); git.init(); git.createFile('v1.txt'); git.add('v1.txt'); git.commit('Release 1'); },
            steps: [
                { task: "List current tags", expected: "git tag", cmd: "git tag" },
                { task: "Create an annotated tag v1.0", expected: "git tag v1.0", cmd: "git tag v1.0", desc: "Tags mark specific release points." },
                { task: "Push tags to remote", expected: "git push --tags", cmd: "git push --tags" }
            ]
        },
        'diff': {
            title: "8. Viewing Changes",
            setup: (git) => { git.reset(); git.init(); git.createFile('code.py'); git.add('code.py'); git.commit('v1'); git.createFile('code.py', 'updated'); git.add('code.py'); },
            steps: [
                { task: "View staged changes", expected: "git diff", cmd: "git diff", desc: "Shows line-by-line differences." },
                { task: "View details of last commit", expected: "git show", cmd: "git show", desc: "Shows the patch and metadata of HEAD." }
            ]
        }
    };

    /**
     * UI & INTERACTION LOGIC
     */
    const terminalOutput = document.getElementById('terminal-output');
    const terminalInput = document.getElementById('terminal-input');
    const guideContent = document.getElementById('guide-content');
    const repoStateDisplay = document.getElementById('repo-state');
    const promptBranch = document.getElementById('prompt-branch-container');
    const moduleSelect = document.getElementById('module-select');
    const loadBtn = document.getElementById('load-module-btn');
    const progressText = document.getElementById('lesson-progress');

    const git = new GitEngine();
    let currentModuleKey = 'workflow-1';
    let currentStepIndex = 0;

    function renderGuide() {
        const mod = modules[currentModuleKey];
        const step = mod.steps[currentStepIndex];
        
        let html = `
            <div class="mb-4">
                <span class="inline-block px-2 py-1 bg-emerald-900/50 text-emerald-400 text-xs rounded mb-2 border border-emerald-800">Active Module</span>
                <h3 class="font-bold text-white text-base">${mod.title}</h3>
            </div>
        `;

        if (step) {
            html += `
                <div class="bg-slate-900/50 p-3 rounded-lg border border-slate-700 mb-4">
                    <div class="text-xs text-slate-400 uppercase tracking-wider font-bold mb-2 flex items-center gap-2">
                        <div class="w-2 h-2 rounded-full bg-blue-500 animate-pulse"></div> Current Task
                    </div>
                    <p class="text-white mb-3">${step.task}</p>
                    ${step.desc ? `<p class="text-slate-400 text-xs mb-3 italic">${step.desc}</p>` : ''}
                    <div class="bg-black/50 p-2 rounded text-emerald-400 font-mono text-xs border border-slate-700/50 flex justify-between group">
                        <span>> ${step.cmd}</span>
                    </div>
                </div>
                
                <div class="text-xs text-slate-500">
                    Type the command exactly or roughly matching the expectation to proceed.
                </div>
            `;
            progressText.innerText = `Step ${currentStepIndex + 1}/${mod.steps.length}`;
        } else {
            html += `
                <div class="bg-emerald-900/30 p-4 rounded-lg border border-emerald-800 text-center">
                    <div class="text-2xl mb-2">🎉</div>
                    <h4 class="text-emerald-400 font-bold mb-1">Module Completed!</h4>
                    <p class="text-slate-300 text-xs">Select a new module from the top menu to continue your training.</p>
                </div>
            `;
            progressText.innerText = `Done`;
        }

        guideContent.innerHTML = html;

        // Update Repo State
        repoStateDisplay.innerHTML = `
            <div class="grid grid-cols-2 gap-2">
                <div><span class="text-slate-500">Init:</span> ${git.isGitInited ? '<span class="text-emerald-400">Yes</span>' : 'No'}</div>
                <div><span class="text-slate-500">Branch:</span> ${git.currentBranch}</div>
                <div><span class="text-slate-500">Staged:</span> ${git.staging.length}</div>
                <div><span class="text-slate-500">Commits:</span> ${git.commits.length}</div>
                <div><span class="text-slate-500">Remotes:</span> ${Object.keys(git.remotes).length}</div>
                <div><span class="text-slate-500">Tags:</span> ${Object.keys(git.tags).length}</div>
            </div>
        `;

        if (git.isGitInited) {
            promptBranch.innerHTML = ` <span class="text-slate-500">(</span><span class="prompt-branch">${git.currentBranch}</span><span class="text-slate-500">)</span>`;
        } else {
            promptBranch.innerHTML = '';
        }
    }

    function loadModule(key) {
        currentModuleKey = key;
        currentStepIndex = 0;
        const mod = modules[key];
        
        mod.setup(git);
        
        terminalOutput.innerHTML = `
            <div class="text-emerald-400 mb-2">--- Switched to Module: ${mod.title} ---</div>
            <div class="text-slate-400 mb-4 italic text-xs">Environment state has been automatically configured.</div>
        `;
        renderGuide();
    }

    function writeToTerminal(text, type = 'output') {
        const div = document.createElement('div');
        div.className = type === 'command' ? 'mt-2' : 'mb-1';
        
        if (type === 'command') {
            const path = git.isGitInited ? ` <span class="text-slate-500">(</span><span class="prompt-branch">${git.currentBranch}</span><span class="text-slate-500">)</span>` : "";
            div.innerHTML = `<span class="prompt-user">user</span>@<span class="prompt-host">git-bash</span> <span class="prompt-path">~</span>${path}<span class="text-slate-300 ml-1">$</span> ${text}`;
        } else {
            let formatted = text
                .replace(/\x1b\[33m/g, '<span class="text-yellow-400">')
                .replace(/\x1b\[32m/g, '<span class="text-emerald-400">')
                .replace(/\x1b\[0m/g, '</span>');
            div.innerHTML = formatted;
        }
        
        terminalOutput.appendChild(div);
        terminalOutput.scrollTop = terminalOutput.scrollHeight;
    }

    function processBashCommand(input) {
        // Handle echo "text" > file
        const echoMatch = input.match(/^echo\s+"([^"]*)"\s*>\s*(.+)$/);
        if (echoMatch) {
            git.createFile(echoMatch[2].trim(), echoMatch[1]);
            return "";
        }
        
        // Handle gpg
        if (input.startsWith('gpg --gen-key')) {
            git.gpgConfigured = true;
            return "Generating public/private rsa key pair.\nYour keys have been created securely.";
        }

        return `bash: command not found: ${input.split(' ')[0]}`;
    }

    function processCommand(rawInput) {
        const input = rawInput.trim();
        if (!input) return;

        writeToTerminal(input, 'command');

        if (input === 'clear') {
            terminalOutput.innerHTML = "";
            return;
        }

        let response = "";

        if (input.startsWith('git ')) {
            const parts = input.split(/\s+/);
            const cmd = parts[1];
            const args = parts.slice(2);
            const argStr = args.join(' ');

            switch(cmd) {
                case 'init': response = git.init(args.includes('--bare')); break;
                case 'clone': response = git.clone(args[0]); break;
                case 'status': response = git.status(); break;
                case 'add': response = git.add(argStr); break;
                case 'commit': 
                    const isAmend = args.includes('--amend');
                    const isSign = args.includes('-S');
                    const msgMatch = input.match(/-m\s+"([^"]+)"/);
                    if (msgMatch) response = git.commit(msgMatch[1], isAmend, isSign);
                    else if (isAmend && !msgMatch) response = git.commit("Amended commit", true, isSign); // Mocking interactive editor
                    else response = "error: switch `m' requires a value";
                    break;
                case 'log': response = git.log(args); break;
                case 'blame': response = `1a2b3c4d (Learner 2026-03-12 1) const init = true;`; break;
                case 'diff': response = git.diff(); break;
                case 'show': response = git.show(); break;
                case 'clean': response = git.clean(args); break;
                case 'tag': response = git.tag(args[0]); break;
                case 'remote': response = git.remote(args[0], args[1], args[2]); break;
                case 'push': response = git.push(); break;
                case 'branch': response = git.branch(args[0]); break;
                case 'checkout': response = git.checkout(args[0]); break;
                case 'config': 
                    if(args.includes('commit.gpgsign') && args.includes('true')) git.gpgConfigured = true;
                    response = ""; 
                    break;
                default: response = `git: '${cmd}' is not a git command.`;
            }
        } else {
            response = processBashCommand(input);
        }

        if (response) writeToTerminal(response);
        
        checkTaskProgress(input);
        renderGuide();
    }

    function checkTaskProgress(input) {
        const mod = modules[currentModuleKey];
        if (currentStepIndex >= mod.steps.length) return;
        
        const step = mod.steps[currentStepIndex];
        let isCorrect = false;

        if (step.expected instanceof RegExp) {
            isCorrect = step.expected.test(input);
        } else {
            // For echo commands, be a bit forgiving with quotes
            if(input.startsWith('echo') && step.expected.startsWith('echo')) {
                isCorrect = input.replace(/"/g,'').trim() === step.expected.replace(/"/g,'').trim();
            } else {
                isCorrect = input.toLowerCase() === step.expected.toLowerCase();
            }
        }

        if (isCorrect) {
            currentStepIndex++;
            if (currentStepIndex < mod.steps.length) {
                setTimeout(() => {
                    writeToTerminal(`\n\x1b[32m[Task Complete]\x1b[0m Next: ${mod.steps[currentStepIndex].task}\n`);
                }, 300);
            }
        }
    }

    // Event Listeners
    terminalInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const val = terminalInput.value;
            terminalInput.value = "";
            processCommand(val);
        }
    });

    loadBtn.addEventListener('click', () => {
        loadModule(moduleSelect.value);
        terminalInput.focus();
    });

    document.addEventListener('click', (e) => {
        if (!e.target.closest('#module-select') && !e.target.closest('#load-module-btn')) {
            terminalInput.focus();
        }
    });

    // Init
    window.onload = () => { 
        loadModule('workflow-1'); 
    };
</script>
